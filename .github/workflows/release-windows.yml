name: Release Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (example: v0.1.1)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag input
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [[ ! "${{ github.event.inputs.release_tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_tag must match vMAJOR.MINOR.PATCH (example: v0.1.1)"
            exit 1
          fi

      - name: Ensure workflow uses selected tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git fetch --tags
          git checkout "${{ github.event.inputs.release_tag }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish Windows installer
        run: npx electron-builder --win nsis --publish always
